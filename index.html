<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gap King Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f0f2f7;--surface:#fff;--border:#dde1ec;--text:#0f1120;--sub:#5a6180;--muted:#9096b0;--dim:#e8eaf4;
  --green:#00a85a;--gl:#e6f7ef;--gb:#7dd4aa;
  --red:#e8203a;--rl:#fef0f2;--rb:#f5aab5;
  --amber:#d97706;--al:#fef7e8;--ab:#f5d588;
  --blue:#2563eb;--sans:'Inter',sans-serif;--mono:'JetBrains Mono',monospace
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--sans);background:var(--bg);color:var(--text)}
.screen{display:none;height:100vh;flex-direction:column;overflow:hidden}
.screen.active{display:flex}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 18px 12px;flex-shrink:0}
.hdr-top{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
.hdr-name{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.03em}
.hdr-sub{font-size:12px;color:var(--muted)}
.legend{display:flex;gap:14px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ld-live{background:var(--green)}.ld-pre{background:var(--amber)}.ld-off{background:var(--muted)}
.city-scroll{flex:1;overflow-y:auto;padding:10px}
.city-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.city-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:4px;box-shadow:0 1px 3px rgba(0,0,0,.04);position:relative;overflow:hidden}
.city-card:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.1)}
.city-card.state-live{border-color:var(--gb);background:linear-gradient(135deg,var(--gl) 0%,#fff 60%)}
.city-card.state-live::before{content:'';position:absolute;top:10px;right:10px;width:8px;height:8px;border-radius:50%;background:var(--green);animation:gpulse 1.4s infinite}
@keyframes gpulse{0%,100%{box-shadow:0 0 0 0 rgba(0,168,90,.5)}70%{box-shadow:0 0 0 6px rgba(0,168,90,0)}}
.city-name{font-size:14px;font-weight:700;color:var(--text)}
.city-vs{font-size:11px;font-weight:500;color:var(--sub)}
.city-score{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--text)}
#screen-watch{background:var(--bg)}
.watch-hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:11px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.back-btn{background:none;border:none;font-family:var(--sans);font-size:13px;font-weight:700;color:var(--blue);cursor:pointer;display:flex;align-items:center;gap:3px;padding:0}
.watch-game{font-size:13px;font-weight:700;color:var(--text)}
.live-chip{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--green);background:var(--gl);border:1px solid var(--gb);padding:3px 8px;border-radius:20px}
.watch-body{flex:1;display:flex;flex-direction:column;padding:10px;gap:9px;overflow:hidden}
.sig-box{border-radius:14px;padding:16px;flex-shrink:0}
.sig-box.idle{background:var(--surface);border:1.5px solid var(--border)}
.sig-box.buy{background:var(--rl);border:2px solid var(--rb);animation:flash .5s}
.sig-lbl{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:4px}
.sig-action{font-size:20px;font-weight:800;letter-spacing:-.02em;line-height:1.15;margin-bottom:6px}
.sig-why{font-size:12px;color:var(--sub);line-height:1.65}
@keyframes flash{0%{box-shadow:0 0 0 0 rgba(232,32,58,.4)}100%{box-shadow:0 0 0 20px rgba(232,32,58,0)}}
.nums-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.num-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 11px}
.nv{font-family:var(--mono);font-size:19px;font-weight:700;color:var(--text)}
.nl{font-size:9px;font-weight:600;color:var(--muted);margin-top:4px;text-transform:uppercase}
.gap-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 13px}
.gap-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.gap-track{flex:1;height:7px;background:var(--dim);border-radius:4px;overflow:hidden}
.gap-fill{height:100%;border-radius:4px;transition:width .6s ease}
.inputs-row{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.input-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 11px}
.field-input{background:var(--dim);border:1.5px solid var(--border);color:var(--text);font-family:var(--mono);font-size:16px;font-weight:700;padding:5px 8px;border-radius:6px;width:100%;text-align:center}
.poll-row{display:flex;align-items:center;gap:8px}
.poll-track{flex:1;height:2px;background:var(--dim);border-radius:1px;overflow:hidden}
.poll-fill{height:100%;background:var(--green);width:0%;transition:width .1s linear}
</style>
</head>
<body>
<div class="screen active" id="screen-pick"><div class="hdr"><div class="hdr-top"><span style="font-size:20px">👑</span><div class="hdr-name">Gap King</div></div><div class="hdr-sub">Tap your team's city to monitor live edge</div><div class="legend"><div class="li"><div class="ld ld-live"></div><span>Live</span></div><div class="li"><div class="ld ld-pre"></div><span>Upcoming</span></div></div></div><div class="city-scroll"><div class="city-grid" id="city-grid">Loading schedule...</div></div></div>
<div class="screen" id="screen-watch"><div class="watch-hdr"><button class="back-btn" onclick="goBack()">‹ Teams</button><div class="watch-game" id="w-game">—</div><div class="live-chip">LIVE</div></div><div class="watch-body"><div class="sig-box idle" id="sig-box"><div class="sig-lbl" id="sig-lbl">MONITORING</div><div class="sig-action" id="sig-action">Connecting...</div><div class="sig-why" id="sig-why">Checking MLB Gumbo and Book odds...</div></div><div class="nums-row"><div class="num-card"><div class="nv" id="n-mlb">—</div><div class="nl">MLB WP%</div></div><div class="num-card"><div class="nv" id="n-book">—</div><div class="nl">Book %</div></div><div class="num-card"><div class="nv" id="n-gap">—</div><div class="nl">Gap</div></div></div><div class="gap-card"><div class="gap-row"><div class="gap-track"><div class="gap-fill" id="bar-mlb" style="background:var(--blue)"></div></div></div><div class="gap-row"><div class="gap-track"><div class="gap-fill" id="bar-book" style="background:var(--muted)"></div></div></div></div><div class="inputs-row"><div class="input-card"><input class="field-input" id="i-odds" type="text" placeholder="Odds (e.g. -125)"></div><div class="input-card"><input class="field-input" id="i-stake" type="text" value="5.00"></div></div><div class="poll-row"><div class="poll-track"><div class="poll-fill" id="poll-fill"></div></div></div></div></div>
<script>
const ODDS_KEY='75fbd1947a7dec109b7573b6951a65aa';const PROXY='https://corsproxy.io/?';const THRESHOLD=8.0;const POLL_MS=15000;const BOOK_PREF=[/hard\s*rock/i,/draftkings/i,/fanduel/i,/betmgm/i,/caesars/i];let selectedGame=null,pollInterval=null,progressInterval=null;
const $=id=>document.getElementById(id);
function mlToProb(odds){const n=Number(odds);if(!Number.isFinite(n)||n===0)return null;return n<0?Math.abs(n)/(Math.abs(n)+100)*100:100/(n+100)*100;}
function setSignal(mode,action,why){const b=$('sig-box');b.className='sig-box '+mode;$('sig-lbl').textContent=mode==='buy'?'BUY SIGNAL':'MONITORING';$('sig-action').textContent=action;$('sig-why').textContent=why;}
async function fetchSchedule(){try{const url=encodeURIComponent('https://statsapi.mlb.com/api/v1/schedule?sportId=1&date='+new Date().toISOString().slice(0,10));const r=await fetch(PROXY+url);const d=await r.json();const games=d?.dates?.[0]?.games||[];const grid=$('city-grid');grid.innerHTML='';if(!games.length){grid.textContent='No games found today.';return;}games.forEach(g=>{const card=document.createElement('div');const st=g?.status?.detailedState||'Scheduled';const isLive=st==='In Progress';card.className=`city-card ${isLive?'state-live':'state-pre'}`;card.innerHTML=`<div class="city-name">${g.teams.home.team.name.split(' ').pop()}</div><div class="city-vs">${g.teams.away.team.abbreviation} @ ${g.teams.home.team.abbreviation}</div><div class="city-score">${isLive?(g.teams.away.score+' - '+g.teams.home.score):st}</div>`;card.onclick=()=>openWatch(g);grid.appendChild(card);});}catch(e){$('city-grid').textContent='Failed to load schedule. Check connection.';}}
async function openWatch(game){selectedGame=game;$('screen-pick').classList.remove('active');$('screen-watch').classList.add('active');$('w-game').textContent=`${game.teams.away.team.abbreviation} @ ${game.teams.home.team.abbreviation}`;if(pollInterval)clearInterval(pollInterval);if(progressInterval)clearInterval(progressInterval);poll();pollInterval=setInterval(poll,POLL_MS);let p=0;progressInterval=setInterval(()=>{p=(p+1)%101;$('poll-fill').style.width=p+'%';},POLL_MS/100);}
function goBack(){clearInterval(pollInterval);clearInterval(progressInterval);$('screen-watch').classList.remove('active');$('screen-pick').classList.add('active');}
function pickBookmaker(game){if(!game?.bookmakers?.length)return null;for(const r of BOOK_PREF){const b=game.bookmakers.find(x=>r.test(x.title));if(b)return b;}return game.bookmakers[0];}
async function poll(){if(!selectedGame)return;try{const mlbUrl=encodeURIComponent(`https://statsapi.mlb.com/api/v1.1/game/${selectedGame.gamePk}/feed/live`);const mlbD=await (await fetch(PROXY+mlbUrl)).json();let homeWp=mlbD?.liveData?.plays?.currentPlay?.about?.homeWinProbability; if(homeWp==null){const plays=mlbD?.liveData?.plays?.allPlays||[];for(let i=plays.length-1;i>=0;i--){const v=plays[i]?.about?.homeWinProbability;if(v!=null){homeWp=v;break;}}}if(homeWp==null)homeWp=50;homeWp=homeWp<=1?homeWp*100:homeWp;
const oddsUrl=encodeURIComponent(`https://api.the-odds-api.com/v4/sports/baseball_mlb/odds/?apiKey=${ODDS_KEY}&regions=us&markets=h2h`);const oddsD=await (await fetch(PROXY+oddsUrl)).json();const homeName=selectedGame.teams.home.team.name,awayName=selectedGame.teams.away.team.name;const gameOdds=Array.isArray(oddsD)?oddsD.find(o=>o.home_team===homeName&&o.away_team===awayName):null;let bookProb=50;if(gameOdds){const book=pickBookmaker(gameOdds);const m=book?.markets?.find(x=>x.key==='h2h');const out=m?.outcomes?.find(x=>x.name===homeName);if(out)bookProb=mlToProb(out.price)??50;}
updateUI(homeWp,bookProb);}catch(e){setSignal('idle','Waiting for data','Could not refresh feeds right now.');console.error(e);}}
function updateUI(mlbWp,bookProb){const gap=mlbWp-bookProb;$('n-mlb').textContent=mlbWp.toFixed(1)+'%';$('n-book').textContent=bookProb.toFixed(1)+'%';$('n-gap').textContent=(gap>=0?'+':'')+gap.toFixed(1)+'%';$('bar-mlb').style.width=Math.max(0,Math.min(100,mlbWp))+'%';$('bar-book').style.width=Math.max(0,Math.min(100,bookProb))+'%';if(gap>=THRESHOLD){setSignal('buy','Place Bet Now',`Model edge is +${gap.toFixed(1)}% over book implied.`);}else{setSignal('idle','Waiting for Edge',`Current gap ${gap.toFixed(1)}% (need ${THRESHOLD.toFixed(1)}%).`);}}
fetchSchedule();
</script>
</body>
</html>
