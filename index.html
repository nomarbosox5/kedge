<!DOCTYPE html>
<html>
<head>
  <title>Live Betting Edge Tracker</title>
  <style>
    body {
      font-family: Arial;
      background: #0b0f14;
      color: white;
      text-align: center;
    }
    .card {
      background: #121821;
      padding: 20px;
      margin: 20px auto;
      width: 400px;
      border-radius: 12px;
    }
    .green { color: #00ff99; }
    .red { color: #ff4d4d; }
    .yellow { color: #ffd966; }
    .bar {
      height: 20px;
      background: #222;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 10px;
    }
    .fill {
      height: 100%;
      background: #00ff99;
    }
  </style>
</head>

<body>

<h1>⚡ Live Edge Tracker</h1>

<div class="card">
  <h2 id="team">Loading...</h2>

  <p>Gumbo Win %: <span id="gumbo"></span></p>
  <p>Market Implied %: <span id="market"></span></p>
  <p>Edge: <span id="edge"></span></p>

  <h2 id="signal"></h2>

  <div class="bar">
    <div id="barFill" class="fill"></div>
  </div>
</div>

<script>
const ODDS_API_KEY = "YOUR_ODDS_API_KEY";

// convert moneyline → probability
function moneylineToProb(odds) {
  if (odds < 0) {
    return Math.abs(odds) / (Math.abs(odds) + 100);
  } else {
    return 100 / (odds + 100);
  }
}

// fetch Hard Rock odds via OddsAPI
async function getOdds() {
  const res = await fetch(`https://api.the-odds-api.com/v4/sports/baseball_mlb/odds/?apiKey=${ODDS_API_KEY}&regions=us&markets=h2h`);
  const data = await res.json();

  // find Hard Rock odds
  for (let game of data) {
    for (let book of game.bookmakers) {
      if (book.title.includes("Hard Rock")) {
        return {
          team: game.home_team,
          odds: book.markets[0].outcomes[0].price
        };
      }
    }
  }
}

// fake Gumbo for now (replace with real API)
async function getGumboProb() {
  // replace this with your Gumbo endpoint
  return Math.random() * 0.2 + 0.6; // 60–80% sim
}

// main loop
async function update() {
  const oddsData = await getOdds();
  const gumboProb = await getGumboProb();

  if (!oddsData) return;

  const implied = moneylineToProb(oddsData.odds);
  const edge = gumboProb - implied;

  // UI updates
  document.getElementById("team").innerText = oddsData.team;
  document.getElementById("gumbo").innerText = (gumboProb*100).toFixed(1) + "%";
  document.getElementById("market").innerText = (implied*100).toFixed(1) + "%";
  document.getElementById("edge").innerText = (edge*100).toFixed(2) + "%";

  const signal = document.getElementById("signal");

  if (edge > 0.05) {
    signal.innerText = "🟢 ENTER";
    signal.className = "green";
  } else if (edge < -0.03) {
    signal.innerText = "🔴 EXIT";
    signal.className = "red";
  } else {
    signal.innerText = "⚖️ HOLD";
    signal.className = "yellow";
  }

  document.getElementById("barFill").style.width = (gumboProb*100) + "%";
}

// refresh every 5 seconds
setInterval(update, 5000);
update();
</script>

</body>
</html>
