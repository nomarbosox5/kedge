<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB Edge Bot</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'JetBrains Mono',monospace;
  background:#0e0e0e; color:#c8c8c8;
  min-height:100vh; padding:20px;
  max-width:640px; margin:0 auto;
}

.hdr { display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #1a1a1a; padding-bottom:12px; margin-bottom:20px; }
.hdr-title { font-size:11px; color:#444; letter-spacing:0.18em; text-transform:uppercase; }
.pill { display:flex; align-items:center; gap:6px; font-size:10px; color:#444; }
.dot { width:7px; height:7px; border-radius:50%; background:#222; flex-shrink:0; }
.dot.on { background:#00e676; animation:blink 1.4s infinite; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

.controls { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:16px; }
.field { display:flex; flex-direction:column; gap:4px; }
.field label { font-size:9px; color:#444; letter-spacing:0.14em; text-transform:uppercase; }
.field input {
  background:#141414; border:1px solid #1e1e1e; color:#e0e0e0;
  font-family:'JetBrains Mono',monospace; font-size:16px;
  padding:9px 10px; border-radius:4px; width:100%;
}
.field input:focus { outline:none; border-color:#555; }

.poll-row { display:flex; align-items:center; gap:10px; margin-bottom:20px; }
.poll-track { flex:1; height:2px; background:#1a1a1a; border-radius:1px; overflow:hidden; }
.poll-fill { height:100%; background:#00e676; border-radius:1px; transition:width 0.05s linear; }
.poll-lbl { font-size:10px; color:#333; white-space:nowrap; }

.slate-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.slate-lbl { font-size:9px; color:#444; letter-spacing:0.15em; text-transform:uppercase; }
.slate-sub { font-size:9px; color:#2a2a2a; }

.game-card {
  background:#111; border:1px solid #1a1a1a; border-radius:6px;
  margin-bottom:8px; overflow:hidden; transition:border-color 0.2s;
}
.game-card.buy   { border-color:#ff1744; animation:flash 0.5s ease; }
.game-card.sell  { border-color:#00e676; }
.game-card.watch { border-color:#ff9100; }
@keyframes flash{0%{box-shadow:0 0 0 0 rgba(255,23,68,0.5)}100%{box-shadow:0 0 0 16px rgba(255,23,68,0)}}

.card-top { display:flex; justify-content:space-between; align-items:center; padding:9px 14px; border-bottom:1px solid #1a1a1a; }
.card-name { font-size:15px; font-weight:700; color:#e0e0e0; }
.card-meta { font-size:9px; color:#333; margin-top:2px; }
.card-badge { font-size:10px; letter-spacing:0.1em; }
.badge-buy   { color:#ff1744; }
.badge-sell  { color:#00e676; }
.badge-watch { color:#ff9100; }
.badge-idle  { color:#333; }

.card-body { padding:12px 14px; }
.nums { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:10px; }
.num-box { text-align:center; }
.num-val { font-size:16px; font-weight:700; color:#e0e0e0; line-height:1; }
.num-val.green  { color:#00e676; }
.num-val.orange { color:#ff9100; }
.num-val.red    { color:#ff1744; }
.num-val.dim    { color:#444; }
.num-lbl { font-size:8px; color:#444; margin-top:3px; letter-spacing:0.1em; text-transform:uppercase; }

.gap-track { height:3px; background:#1a1a1a; border-radius:2px; overflow:hidden; margin-bottom:10px; }
.gap-fill  { height:100%; border-radius:2px; transition:width 0.5s ease; }

.action { font-size:12px; line-height:1.85; padding:10px 12px; border-radius:4px; }
.action.buy   { background:#140000; color:#ff5252; }
.action.sell  { background:#001409; color:#00e676; }
.action.watch { background:#0e0800; color:#ff9100; }
.action.idle  { display:none; }
.action strong { color:#fff; }

.cdown-wrap { text-align:center; padding:4px 0 8px; }
.cdown-num  { font-size:52px; font-weight:700; color:#ff1744; line-height:1; }
.cdown-lbl  { font-size:9px; color:#ff1744; letter-spacing:0.18em; opacity:0.65; }

.odds-row { display:flex; align-items:center; gap:8px; margin-top:8px; }
.odds-row label { font-size:9px; color:#444; letter-spacing:0.1em; text-transform:uppercase; white-space:nowrap; }
.odds-row input {
  background:#0e0e0e; border:1px solid #222; color:#e0e0e0;
  font-family:'JetBrains Mono',monospace; font-size:14px;
  padding:5px 8px; border-radius:3px; width:90px; text-align:center;
}
.odds-row input:focus { outline:none; border-color:#ff9100; }
.odds-row .implied { font-size:10px; color:#444; }

.log-hdr { display:flex; justify-content:space-between; font-size:9px; color:#333; letter-spacing:0.12em; text-transform:uppercase; margin-bottom:6px; }
.log-hdr button { background:none; border:none; color:#2a2a2a; font-family:'JetBrains Mono',monospace; font-size:9px; cursor:pointer; }
.log-hdr button:hover{color:#555;}
.log-box { border:1px solid #1a1a1a; border-radius:4px; max-height:180px; overflow-y:auto; }
.log-row { display:flex; gap:10px; padding:5px 10px; border-bottom:1px solid #141414; font-size:10px; }
.log-row:last-child{border-bottom:none;}
.log-t { color:#2a2a2a; white-space:nowrap; flex-shrink:0; }
.log-m { color:#333; }
.log-m.buy  { color:#ff5252; }
.log-m.sell { color:#00e676; }
.log-m.watch{ color:#ff9100; }
.log-empty  { padding:12px 10px; font-size:10px; color:#2a2a2a; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">MLB Edge Bot — Hard Rock Bet (FL)</div>
  <div class="pill"><div class="dot on" id="dot"></div><span id="dot-lbl">starting...</span></div>
</div>

<div class="controls">
  <div class="field">
    <label>Stake ($)</label>
    <input id="stake" value="5.00" type="text">
  </div>
  <div class="field">
    <label>Gap Threshold (%)</label>
    <input id="threshold" value="8.0" type="text">
  </div>
  <div class="field">
    <label>Poll (sec)</label>
    <input id="poll-interval" value="2" type="text">
  </div>
</div>

<div class="poll-row">
  <div class="poll-track"><div class="poll-fill" id="poll-fill" style="width:0%"></div></div>
  <div class="poll-lbl" id="poll-lbl">loading games...</div>
</div>

<div class="slate-hdr">
  <div class="slate-lbl">Tonight's Slate</div>
  <div class="slate-sub" id="slate-sub">fetching from MLB...</div>
</div>
<div id="slate"></div>

<div class="log-hdr">
  <span>Engine log</span>
  <button onclick="clearLog()">clear</button>
</div>
<div class="log-box" id="log"><div class="log-empty">— starting —</div></div>

<script>
const TARGET_BOOK = "Hard Rock Bet (FL)";
let games = [];
let pollTimer = null;
let progTimer = null;
let prog = 0;
let logRows = [];

function odds_to_prob(odds) {
  if (odds < 0) return (Math.abs(odds) / (Math.abs(odds) + 100)) * 100;
  return (100 / (odds + 100)) * 100;
}

function calculate_trade(stake, buy_odds, current_truth_prob) {
  const buy_prob = odds_to_prob(buy_odds);
  const potential_profit = buy_odds < 0
    ? stake / (Math.abs(buy_odds) / 100)
    : stake * (buy_odds / 100);
  const gross_winnings = stake + potential_profit;
  const edge_value = (current_truth_prob - buy_prob) / 100;
  return { gross: gross_winnings, net: gross_winnings * edge_value };
}

function ts() {
  return new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

// ── auto-start on load ──────────────────────────────────
(async function init() {
  await loadSlate();
  startEngine();
})();

async function loadSlate() {
  try {
    const today = new Date().toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'numeric'});
    const r = await fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${today}`);
    const d = await r.json();
    const raw = d?.dates?.[0]?.games || [];
    games = raw.map(g => ({
      pk:        g.gamePk,
      name:      `${g.teams.away.team.name.split(' ').pop()} @ ${g.teams.home.team.name.split(' ').pop()}`,
      fullName:  `${g.teams.away.team.name} vs ${g.teams.home.team.name}`,
      status:    g.status.detailedState,
      truth:     null,
      marketOdds:-110,
      betTimer:  null,
    }));
    document.getElementById('slate-sub').textContent = `${games.length} games · April 28, 2026`;
    addLog(ts(), `Slate loaded: ${games.length} games`, '');
  } catch(e) {
    // Google's hardcoded fallback
    games = [
      { pk:'287579', name:'NYY @ TEX', fullName:'New York Yankees vs Texas Rangers', truth:null, marketOdds:-125, betTimer:null },
      { pk:'',       name:'MIA @ LAD', fullName:'Miami Marlins vs Los Angeles Dodgers', truth:null, marketOdds:210,  betTimer:null },
      { pk:'',       name:'TB @ CLE',  fullName:'Tampa Bay Rays vs Cleveland Guardians', truth:null, marketOdds:-110, betTimer:null },
    ];
    document.getElementById('slate-sub').textContent = 'MLB API unavailable — fallback slate';
    addLog(ts(), 'MLB API unreachable — using fallback slate', 'watch');
  }
  renderSlate();
}

function renderSlate() {
  document.getElementById('slate').innerHTML = games.map((g,i) => `
    <div class="game-card" id="card-${i}">
      <div class="card-top">
        <div>
          <div class="card-name">${g.name}</div>
          <div class="card-meta">${g.fullName}${g.pk ? ' · ID:'+g.pk : ''}</div>
        </div>
        <div class="card-badge badge-idle" id="badge-${i}">● WAITING</div>
      </div>
      <div class="card-body">
        <div class="nums">
          <div class="num-box"><div class="num-val dim" id="truth-${i}">—</div><div class="num-lbl">MLB WP %</div></div>
          <div class="num-box"><div class="num-val dim" id="mkt-${i}">—</div><div class="num-lbl">HRB implied %</div></div>
          <div class="num-box"><div class="num-val dim" id="gap-${i}">—</div><div class="num-lbl">Gap</div></div>
          <div class="num-box"><div class="num-val dim" id="net-${i}">—</div><div class="num-lbl">Pred. net $</div></div>
        </div>
        <div class="gap-track"><div class="gap-fill" id="gapbar-${i}" style="width:0%;background:#333;"></div></div>
        <div class="action idle" id="action-${i}"></div>
        <div class="cdown-wrap" id="cdown-wrap-${i}" style="display:none">
          <div class="cdown-num" id="cdown-${i}">15</div>
          <div class="cdown-lbl">SECONDS — PLACE BET NOW</div>
        </div>
        <div class="odds-row">
          <label>Hard Rock ML:</label>
          <input type="text" id="odds-${i}" value="${g.marketOdds}" placeholder="-110"
            oninput="updateOdds(${i},this.value)">
          <span class="implied" id="implied-${i}">${odds_to_prob(g.marketOdds).toFixed(1)}% implied</span>
        </div>
      </div>
    </div>`).join('');
}

function updateOdds(i, val) {
  const n = parseFloat(val);
  if (!isNaN(n) && n !== 0) {
    games[i].marketOdds = n;
    document.getElementById(`implied-${i}`).textContent = odds_to_prob(n).toFixed(1) + '% implied';
  }
}

function startEngine() {
  const ms = (parseFloat(document.getElementById('poll-interval').value) || 2) * 1000;
  document.getElementById('dot').classList.add('on');
  document.getElementById('dot-lbl').textContent = `live · ${ms/1000}s poll`;
  addLog(ts(), `Engine running | Stake:$${document.getElementById('stake').value} | Threshold:${document.getElementById('threshold').value}% | ${TARGET_BOOK}`, '');

  doPoll();
  pollTimer = setInterval(doPoll, ms);
  progTimer = setInterval(() => {
    prog = Math.min(100, prog + (100/(ms/50)));
    document.getElementById('poll-fill').style.width = prog+'%';
    document.getElementById('poll-lbl').textContent =
      `next poll ${((ms - prog*ms/100)/1000).toFixed(1)}s`;
  }, 50);
}

async function doPoll() {
  prog = 0;
  const stake     = parseFloat(document.getElementById('stake').value)     || 5;
  const threshold = parseFloat(document.getElementById('threshold').value) || 8;

  for (let i = 0; i < games.length; i++) {
    const g = games[i];
    let truth = null;

    if (g.pk) {
      try {
        const r = await fetch(`https://statsapi.mlb.com/api/v1.1/game/${g.pk}/feed/live`);
        const d = await r.json();
        let wp = d?.liveData?.plays?.currentPlay?.about?.homeWinProbability ?? null;
        if (wp === null) {
          const m = JSON.stringify(d).match(/"homeWinProbability"\s*:\s*([\d.]+)/);
          if (m) wp = parseFloat(m[1]);
        }
        if (wp !== null) truth = wp > 1 ? wp : wp * 100;
      } catch(e) {}
    }

    if (truth === null && g.truth !== null) truth = g.truth;
    if (truth !== null) games[i].truth = truth;
    updateCard(i, truth, g.marketOdds, stake, threshold);
  }
}

function updateCard(i, truth_prob, market_odds, stake, gap_threshold) {
  const g = games[i];
  const market_prob = odds_to_prob(market_odds);

  if (truth_prob === null) {
    document.getElementById(`mkt-${i}`).textContent = market_prob.toFixed(1);
    return;
  }

  const gap = truth_prob - market_prob;
  const { gross, net } = calculate_trade(stake, market_odds, truth_prob);

  document.getElementById(`truth-${i}`).textContent = truth_prob.toFixed(1);
  document.getElementById(`mkt-${i}`).textContent   = market_prob.toFixed(1);

  const gapEl = document.getElementById(`gap-${i}`);
  gapEl.textContent = (gap >= 0 ? '+' : '') + gap.toFixed(1);
  gapEl.className   = 'num-val ' + (gap >= gap_threshold ? 'green' : gap >= 4 ? 'orange' : gap < -4 ? 'red' : 'dim');

  const netEl = document.getElementById(`net-${i}`);
  netEl.textContent = (net >= 0 ? '+$' : '-$') + Math.abs(net).toFixed(2);
  netEl.className   = 'num-val ' + (net > 0 ? 'green' : net < -0.5 ? 'red' : 'dim');

  const barPct   = Math.min(100, Math.max(0, (gap / gap_threshold) * 100));
  const barColor = gap >= gap_threshold ? '#00e676' : gap >= 4 ? '#ff9100' : '#333';
  document.getElementById(`gapbar-${i}`).style.width      = barPct + '%';
  document.getElementById(`gapbar-${i}`).style.background = barColor;

  const card   = document.getElementById(`card-${i}`);
  const badge  = document.getElementById(`badge-${i}`);
  const action = document.getElementById(`action-${i}`);

  if (gap >= gap_threshold) {
    card.className   = 'game-card buy';
    badge.className  = 'card-badge badge-buy';
    badge.textContent = '🚨 BUY SIGNAL';
    action.className = 'action buy';
    action.innerHTML =
      `🚨 BUY SIGNAL: <strong>${g.name} Moneyline</strong><br>
       REASON: <strong>+${gap.toFixed(1)}% Advantage Detected!</strong><br>
       ACTION: Place <strong>$${stake}</strong> at <strong>${market_odds}</strong> on ${TARGET_BOOK}<br>
       💰 Gross if win: <strong>$${gross.toFixed(2)}</strong> · Predicted net: <strong>$${net.toFixed(2)}</strong>`;
    startBetTimer(i);
    addLog(ts(), `🚨 BUY: ${g.name} | +${gap.toFixed(1)}% | $${stake} @ ${market_odds} | Net:$${net.toFixed(2)}`, 'buy');

  } else if (gap < 1.0 && truth_prob > 80.0) {
    card.className   = 'game-card sell';
    badge.className  = 'card-badge badge-sell';
    badge.textContent = '✅ SELL SIGNAL';
    action.className = 'action sell';
    action.innerHTML =
      `✅ SELL SIGNAL: Market has corrected. Cash Out for profit.<br>
       👉 CLOSE WITH: <strong>"Cash Out" button on Hard Rock app</strong><br>
       💸 Target profit: <strong>~$${net.toFixed(2)}</strong>`;
    clearBetTimer(i);
    addLog(ts(), `✅ SELL: ${g.name} | Gap:${gap.toFixed(1)}% | WP:${truth_prob.toFixed(1)}%`, 'sell');

  } else if (gap >= 4.0) {
    card.className   = 'game-card watch';
    badge.className  = 'card-badge badge-watch';
    badge.textContent = '👀 WATCH';
    action.className = 'action watch';
    action.innerHTML =
      `Gap <strong>+${gap.toFixed(1)}%</strong> — need <strong>${(gap_threshold-gap).toFixed(1)}% more</strong> to fire.<br>
       Have Hard Rock open on this game.`;
    clearBetTimer(i);

  } else {
    card.className   = 'game-card';
    badge.className  = 'card-badge badge-idle';
    badge.textContent = '● MONITORING';
    action.className = 'action idle';
    clearBetTimer(i);
  }
}

function startBetTimer(i) {
  if (games[i].betTimer) return;
  let secs = 15;
  document.getElementById(`cdown-wrap-${i}`).style.display = 'block';
  document.getElementById(`cdown-${i}`).textContent = secs;
  games[i].betTimer = setInterval(() => {
    secs--;
    document.getElementById(`cdown-${i}`).textContent = secs;
    if (secs <= 0) { clearBetTimer(i); addLog(ts(), `Window expired: ${games[i].name}`, 'watch'); }
  }, 1000);
}

function clearBetTimer(i) {
  if (games[i]?.betTimer) { clearInterval(games[i].betTimer); games[i].betTimer = null; }
  const w = document.getElementById(`cdown-wrap-${i}`);
  if (w) w.style.display = 'none';
}

function addLog(t, msg, cls) {
  logRows.unshift({t,msg,cls});
  if (logRows.length > 80) logRows.pop();
  document.getElementById('log').innerHTML = logRows.map(r =>
    `<div class="log-row"><span class="log-t">${r.t}</span><span class="log-m ${r.cls}">${r.msg}</span></div>`
  ).join('');
}
function clearLog() {
  logRows = [];
  document.getElementById('log').innerHTML = '<div class="log-empty">— cleared —</div>';
}
</script>
</body>
</html>
