<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | Unified Market Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .glow-green { color: #4ade80; text-shadow: 0 0 8px rgba(74, 222, 128, 0.4); }
        .glow-red { color: #f87171; text-shadow: 0 0 8px rgba(248, 113, 113, 0.4); }
        tr { border-bottom: 1px solid rgba(255,255,255,0.03); transition: background 0.2s; }
        tr:hover { background: rgba(255,255,255,0.02); }
        .text-header { font-size: 9px; text-transform: uppercase; letter-spacing: 0.15em; color: #64748b; font-weight: 800; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-end mb-6">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-white">MLB <span class="text-blue-500">TERMINAL</span></h1>
                <p class="text-slate-500 text-[10px] uppercase tracking-[0.2em] font-bold">Florida Node | Real-Time Arbitrage</p>
            </div>
            <div class="text-right">
                <span id="countdown" class="font-mono text-xl text-blue-500/80">60s</span>
                <div class="text-[9px] text-slate-600 uppercase mt-1">Market Sync</div>
            </div>
        </div>

        <!-- Terminal Table -->
        <div class="glass rounded-xl overflow-hidden shadow-2xl">
            <table class="w-full text-left">
                <thead>
                    <tr class="bg-white/5">
                        <th class="p-4 text-header">City For</th>
                        <th class="p-4 text-header text-center">HR Win %</th>
                        <th class="p-4 text-header text-center">API Win %</th>
                        <th class="p-4 text-header text-center">Diff</th>
                        <th class="p-4 text-header text-center">HR Proposed Open</th>
                        <th class="p-4 text-header text-center">Est. Close Bet</th>
                        <th class="p-4 text-header">Against</th>
                        <th class="p-4 text-header">Score</th>
                    </tr>
                </thead>
                <tbody id="oddsBody" class="font-medium text-[13px]">
                    <tr><td colspan="8" class="p-10 text-center text-slate-600 animate-pulse">Initializing Single Call Fetch...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_KEY = '25bafa02832145bbfc9cce3e84332668';
        let timeLeft = 60;

        function getProb(american) {
            if (!american || american === "N/A") return 0;
            const n = parseFloat(american);
            return n > 0 ? (100 / (n + 100)) : (Math.abs(n) / (Math.abs(n) + 100));
        }

        function toMoneyline(prob) {
            if (prob <= 0 || prob >= 1) return "N/A";
            if (prob > 0.5) {
                return "-" + Math.round((prob / (1 - prob)) * 100);
            } else {
                return "+" + Math.round(((1 - prob) / prob) * 100);
            }
        }

        async function fetchMarketData() {
            // Using one comprehensive call that includes both odds and current scores
            const url = `https://api.the-odds-api.com/v4/sports/baseball_mlb/odds/?apiKey=${API_KEY}&regions=us,us2&markets=h2h&oddsFormat=american&include_scores=true`;
            const tableBody = document.getElementById('oddsBody');
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                let masterList = [];

                data.forEach(game => {
                    const hr = game.bookmakers.find(b => b.key === 'hardrockbet_fl') || 
                               game.bookmakers.find(b => b.key === 'hardrockbet');
                    const apiSource = game.bookmakers.find(b => b.key === 'draftkings' || b.key === 'fanduel');

                    if (hr && apiSource) {
                        [game.home_team, game.away_team].forEach(team => {
                            const isHome = team === game.home_team;
                            const hrLine = hr.markets[0].outcomes.find(o => o.name === team)?.price;
                            const apiLine = apiSource.markets[0].outcomes.find(o => o.name === team)?.price;
                            
                            if (hrLine && apiLine) {
                                const hrProb = getProb(hrLine);
                                const apiProb = getProb(apiLine);
                                const diff = (apiProb - hrProb) * 100;

                                // Extracting score from the unified call
                                let scoreDisplay = "0-0";
                                if (game.scores) {
                                    const hS = game.scores.find(s => s.name === game.home_team)?.score || 0;
                                    const aS = game.scores.find(s => s.name === game.away_team)?.score || 0;
                                    scoreDisplay = isHome ? `${hS}-${aS}` : `${aS}-${hS}`;
                                }

                                masterList.push({
                                    team,
                                    hrPct: (hrProb * 100).toFixed(1),
                                    apiPct: (apiProb * 100).toFixed(1),
                                    diff: diff.toFixed(2),
                                    hrProposed: hrLine > 0 ? "+" + hrLine : hrLine,
                                    estClose: toMoneyline(apiProb),
                                    against: isHome ? game.away_team : game.home_team,
                                    score: scoreDisplay
                                });
                            }
                        });
                    }
                });

                masterList.sort((a, b) => b.diff - a.diff);

                tableBody.innerHTML = masterList.map(item => `
                    <tr>
                        <td class="p-4 font-bold text-slate-100">${item.team}</td>
                        <td class="p-4 text-center text-slate-500">${item.hrPct}%</td>
                        <td class="p-4 text-center text-slate-300">${item.apiPct}%</td>
                        <td class="p-4 text-center font-bold ${item.diff > 0 ? 'glow-green' : 'glow-red'}">
                            ${item.diff > 0 ? '+' : ''}${item.diff}%
                        </td>
                        <td class="p-4 text-center text-blue-400 font-mono">${item.hrProposed}</td>
                        <td class="p-4 text-center text-slate-400 font-mono">${item.estClose}</td>
                        <td class="p-4 text-slate-500 text-xs">${item.against}</td>
                        <td class="p-4 font-mono text-blue-500 text-xs">${item.score}</td>
                    </tr>
                `).join('');

                timeLeft = 60;
            } catch (err) {
                console.error("Fetch Error:", err);
            }
        }

        setInterval(() => {
            timeLeft--;
            document.getElementById('countdown').innerText = timeLeft + 's';
            if (timeLeft <= 0) fetchMarketData();
        }, 1000);

        fetchMarketData();
    </script>
</body>
</html>
