<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAP KING | LIVE COMMAND</title>

<style>
:root {
    --bg: #000;
    --bg-alt: #111;
    --row-border: #222;
    --text-main: #fff;
    --text-muted: #777;
    --accent-live: #22c55e;
    --accent-gap-high: #ef4444;
    --accent-win: #3b82f6;
    --accent-odds: #fbbf24;
}
* { box-sizing: border-box; }

body {
    background: var(--bg);
    color: var(--text-main);
    font-family: system-ui, sans-serif;
    margin: 0;
    padding: 5px;
    overflow: auto;
}

#status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    color: var(--text-muted);
    padding: 4px 6px;
    background: var(--bg-alt);
    border-bottom: 1px solid var(--row-border);
}

#refresh-btn {
    background:#333;
    color:#fff;
    border:1px solid #444;
    padding:4px 8px;
    border-radius:4px;
    cursor:pointer;
    font-size:10px;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
    table-layout: fixed;
}

th {
    background: #181818;
    color: #888;
    text-align: left;
    padding: 6px 4px;
    border-bottom: 1px solid var(--row-border);
}

td {
    padding: 8px 4px;
    border-bottom: 1px solid var(--row-border);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.live { color: var(--accent-live); font-weight: 700; }
.gap-high { background: rgba(239,68,68,0.2); color: var(--accent-gap-high); font-weight: bold; }
.win-pct { color: var(--accent-win); font-weight: 600; }
.odd-val { color: var(--accent-odds); }

</style>
</head>
<body>

<div id="status-bar">
    <div id="clock">SYSTEM READY</div>
    <button id="refresh-btn">PULL NOW</button>
    <div id="api-status">API: IDLE</div>
</div>

<table>
<thead>
<tr>
<th width="20%">TEAM</th>
<th width="10%">SCORE</th>
<th width="12%">BOOK %</th>
<th width="12%">MLB %</th>
<th width="12%">GAP</th>
<th width="12%">ODDS</th>
<th width="12%">MODEL</th>
</tr>
</thead>
<tbody id="grid-body"></tbody>
</table>

<audio id="alarm" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
const ODDS_KEY = "25bafa02832145bbfc9cce3e84332668";
const PROXY = "https://green-hat-0844.nomarbosox5.workers.dev/?url=";
const THRESHOLD = 8;

// unlock audio
document.body.addEventListener("click", () => {
    document.getElementById("alarm").play().catch(()=>{});
}, { once: true });

function proxied(url){
    return PROXY + encodeURIComponent(url);
}

function normalize(name){
    return name.toLowerCase().replace(/[^a-z]/g,'');
}

function amToProb(odds){
    const n = parseFloat(odds);
    if (n < 0) return (Math.abs(n)/(Math.abs(n)+100))*100;
    return (100/(n+100))*100;
}

function probToAm(p){
    if (p >= 50) return Math.round(-100*(p/(100-p)));
    return "+"+Math.round(100*((100-p)/p));
}

async function update(){
    const status = document.getElementById("api-status");
    status.innerText = "API: LOADING";

    try{
        const oddsUrl = proxied(`https://api.the-odds-api.com/v4/sports/baseball_mlb/odds/?regions=us&apiKey=${ODDS_KEY}&oddsFormat=american`);
        const schedUrl = proxied(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&hydrate=linescore`);

        const [oddsRes, schedRes] = await Promise.all([fetch(oddsUrl), fetch(schedUrl)]);
        const odds = await oddsRes.json();
        const sched = await schedRes.json();

        const games = sched?.dates?.[0]?.games || [];

        // map odds
        const oddsMap = {};
        odds.forEach(o=>{
            oddsMap[normalize(o.home_team)] = o;
        });

        // fetch all live games in parallel
        const liveDataArr = await Promise.all(
            games.map(g =>
                fetch(proxied(`https://statsapi.mlb.com/api/v1.1/game/${g.gamePk}/feed/live`))
                .then(r=>r.json())
                .catch(()=>null)
            )
        );

        let rows = [];
        let alarm = false;

        for(let i=0;i<games.length;i++){
            const g = games[i];
            const live = liveDataArr[i];

            const home = g?.teams?.home?.team?.name;
            const away = g?.teams?.away?.team?.name;
            if(!home || !away) continue;

            const wp =
                live?.liveData?.plays?.currentPlay?.about?.homeWinProbability ??
                live?.liveData?.linescore?.teams?.home?.winProbability;

            if(typeof wp !== "number") continue;

            const oddsMatch = oddsMap[normalize(home)];
            if(!oddsMatch) continue;

            const book = oddsMatch.bookmakers?.[0];
            const outcomes = book?.markets?.[0]?.outcomes;
            if(!outcomes) continue;

            const homeOdds = outcomes.find(o=>normalize(o.name)===normalize(home));
            if(!homeOdds) continue;

            const am = homeOdds.price;
            const bookProb = amToProb(am);
            const gap = wp - bookProb;

            if(gap >= THRESHOLD) alarm = true;

            rows.push({
                team: home.split(" ").pop(),
                score: `${g.teams.away.score||0}-${g.teams.home.score||0}`,
                book: bookProb.toFixed(1),
                wp: wp.toFixed(1),
                gap: gap.toFixed(1),
                odds: am>0?`+${am}`:am,
                model: probToAm(wp),
                live: g.status?.abstractGameState==="Live"
            });
        }

        rows.sort((a,b)=>b.gap-a.gap);

        document.getElementById("grid-body").innerHTML =
            rows.length ?
            rows.map(r=>`
                <tr>
                    <td class="${r.live?'live':''}">${r.team}</td>
                    <td>${r.score}</td>
                    <td>${r.book}%</td>
                    <td class="win-pct">${r.wp}%</td>
                    <td class="${r.gap>=THRESHOLD?'gap-high':''}">${r.gap}%</td>
                    <td class="odd-val">${r.odds}</td>
                    <td>${r.model}</td>
                </tr>
            `).join("")
            :
            `<tr><td colspan="7" style="text-align:center;color:#555;padding:20px">NO DATA</td></tr>`;

        if(alarm){
            document.getElementById("alarm").play().catch(()=>{});
        }

        status.innerText = "API: LIVE";
        document.getElementById("clock").innerText = new Date().toLocaleTimeString();

    }catch(e){
        console.error(e);
        status.innerText = "API: ERROR";
    }
}

document.getElementById("refresh-btn").onclick = update;

setInterval(update, 60000);
update();
</script>

</body>
</html>
