<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAP KING | LIVE COMMAND</title>
    <style>
        :root { --bg: #000; --bg-alt: #111; --row-border: #222; --text-main: #fff; --text-muted: #777; --accent-live: #22c55e; --accent-gap-high: #ef4444; --accent-win: #3b82f6; --accent-odds: #fbbf24; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text-main); font-family: system-ui, sans-serif; margin: 0; padding: 5px; overflow: hidden; }
        #status-bar { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); padding: 4px 6px; background: var(--bg-alt); border-bottom: 1px solid var(--row-border); }
        table { width: 100%; border-collapse: collapse; font-size: 11px; table-layout: fixed; }
        th { background: #181818; color: #888; text-align: left; padding: 6px 4px; font-weight: 500; border-bottom: 1px solid var(--row-border); }
        td { padding: 8px 4px; border-bottom: 1px solid var(--row-border); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .live { color: var(--accent-live); font-weight: 700; }
        .gap-high { background: rgba(239, 68, 68, 0.2); color: var(--accent-gap-high); font-weight: bold; }
        .win-pct { color: var(--accent-win); font-weight: 600; }
        .odd-val { color: var(--accent-odds); }
    </style>
</head>
<body>

<div id="status-bar">
    <div id="clock">SYSTEM READY</div>
    <div>HARD ROCK FL | ALARM: &gt;8%</div>
    <div id="api-status">API: IDLE</div>
</div>

<table id="main-table">
