<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kedge | Sports Insights</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: #2a2a2a; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #007bff; }
        .status { color: #888; font-size: 0.9em; }
        h1 { color: #007bff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Kedge Insights</h1>
        <div id="status" class="status">Initializing...</div>
        <div id="output"></div>
    </div>

    <script>
        // CONFIGURATION
        const ODDS_API_KEY = '75fbd106886e927c3e800627d3536862'; // Your Odds API Key
        const CORS_PROXY = "https://corsproxy.io/?url=";
        
        const statusEl = document.getElementById('status');
        const outputEl = document.getElementById('output');

        async function fetchData() {
            try {
                statusEl.innerText = "Fetching live MLB data...";
                
                // 1. Fetch MLB Schedule via CORS Proxy
                const mlbUrl = `${CORS_PROXY}https://statsapi.mlb.com/api/v1/schedule?sportId=1`;
                const mlbRes = await fetch(mlbUrl);
                const mlbData = await mlbRes.json();

                // 2. Fetch Odds via CORS Proxy
                statusEl.innerText = "Fetching betting lines...";
                const oddsUrl = `${CORS_PROXY}https://api.the-odds-api.com/v4/sports/baseball_mlb/odds/?regions=us&oddsFormat=american&apiKey=${ODDS_API_KEY}`;
                const oddsRes = await fetch(oddsUrl);
                const oddsData = await oddsRes.json();

                displayResults(mlbData, oddsData);
                statusEl.innerText = "Data updated: " + new Date().toLocaleTimeString();

            } catch (err) {
                console.error(err);
                statusEl.innerText = "Error: Could not load data. Check console.";
            }
        }

        function displayResults(mlb, odds) {
            outputEl.innerHTML = '';
            const games = mlb.dates[0]?.games || [];

            if (games.length === 0) {
                outputEl.innerHTML = '<p>No games scheduled for today.</p>';
                return;
            }

            games.forEach(game => {
                const homeTeam = game.teams.home.team.name;
                const awayTeam = game.teams.away.team.name;
                
                // Find matching odds for this game
                const gameOdds = odds.find(o => 
                    o.home_team.includes(homeTeam) || homeTeam.includes(o.home_team)
                );

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <strong>${awayTeam} @ ${homeTeam}</strong><br>
                    <small>Status: ${game.status.abstractGameState}</small><br>
                    ${gameOdds ? `<span>Odds: ${gameOdds.bookmakers[0]?.markets[0]?.outcomes[0].name} (${gameOdds.bookmakers[0]?.markets[0]?.outcomes[0].price})</span>` : '<span>Odds: Not available</span>'}
                `;
                outputEl.appendChild(card);
            });
        }

        // Run on load
        fetchData();
    </script>
</body>
</html>
