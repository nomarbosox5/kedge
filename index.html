<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAP KING | LIVE COMMAND</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 5px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; table-layout: fixed; }
        th { background: #222; color: #888; text-align: left; padding: 4px; font-weight: normal; }
        td { padding: 4px; border-bottom: 1px solid #222; white-space: nowrap; overflow: hidden; }
        .live { color: #00ff00; font-weight: bold; }
        .gap-high { background: rgba(255, 0, 0, 0.3); color: #ff4d4d; font-weight: bold; border-radius: 3px; }
        .win-pct { color: #3b82f6; font-weight: bold; }
        .odd-val { color: #fbbf24; }
        #status-bar { display: flex; justify-content: space-between; font-size: 10px; color: #555; padding: 2px 5px; background: #111; }
    </style>
</head>
<body>

<div id="status-bar">
    <div id="clock">BOOTING...</div>
    <div>HARD ROCK FL MONITOR | ALARM: >8%</div>
    <div id="api-status">API: IDLE</div>
</div>

<table id="main-table">
    <thead>
        <tr>
            <th width="18%">CITY/INN</th>
            <th width="12%">SCORE</th>
            <th width="14%">BOOK %</th>
            <th width="14%">MLB %</th>
            <th width="10%">GAP</th>
            <th width="16%">HR ODDS</th>
            <th width="16%">MODEL ODDS</th>
        </tr>
    </thead>
    <tbody id="grid-body">
        <!-- Live Rows Injected Here -->
    </tbody>
</table>

<audio id="alarm-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
const ODDS_KEY = '75fbd1947a7dec109b7573b6951a65aa';
const CORS = "https://corsproxy.io/?url=";
const THRESHOLD = 8.0;

function amToProb(odds) {
    const n = parseFloat(odds);
    return n < 0 ? (Math.abs(n) / (Math.abs(n) + 100)) * 100 : (100 / (n + 100)) * 100;
}

function probToAm(prob) {
    if (prob >= 50) return Math.round(-100 * (prob / (100 - prob)));
    return "+" + Math.round(100 * ((100 - prob) / prob));
}

async function update() {
    try {
        document.getElementById('api-status').innerText = "API: PULLING...";
        
        // 1. Pull All MLB Odds (1 Token)
        const oddsRes = await fetch(`${CORS}https://api.the-odds-api.com/v4/sports/baseball_mlb/odds/?regions=us&apiKey=${ODDS_KEY}&bookmakers=hardrock`);
        const oddsData = await oddsRes.json();

        // 2. Pull Schedule for Scores
        const mlbRes = await fetch(`${CORS}https://statsapi.mlb.com/api/v1/schedule?sportId=1&hydrate=linescore`);
        const mlbData = await mlbRes.json();
        const games = mlbData.dates[0]?.games || [];

        let tableRows = [];
        let alarmTriggered = false;

        for (const game of games) {
            const homeTeam = game.teams.home.team.name;
            const awayTeam = game.teams.away.team.name;
            
            // Get MLB Win Prob for current game
            const liveRes = await fetch(`${CORS}https://statsapi.mlb.com/api/v1.1/game/${game.gamePk}/feed/live`);
            const liveData = await liveRes.json();
            const homeWP = liveData?.liveData?.plays?.currentPlay?.about?.homeWinProbability || 50;
            
            // Find Hard Rock Odds
            const oddsMatch = oddsData.find(o => o.home_team === homeTeam);
            const hrMarket = oddsMatch?.bookmakers[0]?.markets[0]?.outcomes;
            const hrHomeOdds = hrMarket?.find(out => out.name === homeTeam)?.price || 0;
            
            if (hrHomeOdds) {
                const bookProb = (1 / hrHomeOdds) * 100; // Decimal price to prob
                const gap = homeWP - bookProb;
                const amOdds = oddsMatch.bookmakers[0].markets[0].outcomes[0].price_american; // Convert to American for UI

                if (gap >= THRESHOLD) alarmTriggered = true;

                tableRows.push({
                    city: homeTeam.split(' ').pop(),
                    inn: game.linescore?.currentInningOrdinal ? (game.linescore.inningHalf === 'top' ? '▲' : '▼') + game.linescore.currentInningOrdinal : 'PRE',
                    score: `${game.teams.away.score || 0}-${game.teams.home.score || 0}`,
                    bookProb: bookProb.toFixed(1) + '%',
                    mlbWP: homeWP.toFixed(1) + '%',
                    gap: gap.toFixed(1) + '%',
                    gapVal: gap,
                    hrOdds: amOdds,
                    modelOdds: probToAm(homeWP),
                    isLive: game.status.abstractGameState === 'Live'
                });
            }
        }

        // Sort by Gap
        tableRows.sort((a, b) => b.gapVal - a.gapVal);

        const tbody = document.getElementById('grid-body');
        tbody.innerHTML = tableRows.map(r => `
            <tr>
                <td class="${r.isLive ? 'live' : ''}">${r.city} <small>${r.inn}</small></td>
                <td>${r.score}</td>
                <td>${r.bookProb}</td>
                <td class="win-pct">${r.mlbWP}</td>
                <td class="${r.gapVal >= THRESHOLD ? 'gap-high' : ''}">${r.gap}</td>
                <td class="odd-val">${r.hrOdds}</td>
                <td>${r.modelOdds}</td>
            </tr>
        `).join('');

        if (alarmTriggered) document.getElementById('alarm-sound').play();
        document.getElementById('api-status').innerText = "API: SLEEP";
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();

    } catch (e) {
        console.error(e);
        document.getElementById('api-status').innerText = "API: ERROR";
    }
}

// Initial pull and 60s interval
update();
setInterval(update, 60000);
</script>
</body>
</html>
