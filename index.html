<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAP KING | LIVE COMMAND</title>
    <style>
        :root { --bg: #000; --bg-alt: #111; --row-border: #222; --text-main: #fff; --text-muted: #777; --accent-live: #22c55e; --accent-gap-high: #ef4444; --accent-win: #3b82f6; --accent-odds: #fbbf24; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text-main); font-family: system-ui, sans-serif; margin: 0; padding: 5px; overflow: hidden; }
        #status-bar { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); padding: 4px 6px; background: var(--bg-alt); border-bottom: 1px solid var(--row-border); }
        table { width: 100%; border-collapse: collapse; font-size: 11px; table-layout: fixed; }
        th { background: #181818; color: #888; text-align: left; padding: 6px 4px; font-weight: 500; border-bottom: 1px solid var(--row-border); }
        td { padding: 8px 4px; border-bottom: 1px solid var(--row-border); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .live { color: var(--accent-live); font-weight: 700; }
        .gap-high { background: rgba(239, 68, 68, 0.2); color: var(--accent-gap-high); font-weight: bold; }
        .win-pct { color: var(--accent-win); font-weight: 600; }
        .odd-val { color: var(--accent-odds); }
        .loading-text { text-align: center; padding: 40px; color: #444; font-size: 14px; }
    </style>
</head>
<body>

<div id="status-bar">
    <div id="clock">INITIALIZING...</div>
    <div>HARD ROCK FL | ALARM: >8%</div>
    <div id="api-status">API: IDLE</div>
</div>

<table id="main-table">
    <thead>
        <tr>
            <th width="20%">CITY/INN</th>
            <th width="10%">SCORE</th>
            <th width="12%">BOOK %</th>
            <th width="12%">MLB %</th>
            <th width="12%">GAP %</th>
            <th width="12%">HR ODDS</th>
            <th width="12%">MODEL</th>
        </tr>
    </thead>
    <tbody id="grid-body">
        <tr><td colspan="7" class="loading-text">CONNECTING TO LIVE FEEDS...</td></tr>
    </tbody>
</table>

<audio id="alarm-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
const ODDS_KEY = '75fbd1947a7dec109b7573b6951a65aa'; 
const CORS = "https://corsproxy.io/?url=";
const THRESHOLD = 8.0;

function amToProb(odds) {
    const n = parseFloat(odds);
    if (isNaN(n) || n === 0) return 0;
    return n < 0 ? (Math.abs(n) / (Math.abs(n) + 100)) * 100 : (100 / (n + 100)) * 100;
}

function probToAm(prob) {
    if (prob >= 99) return "-9999";
    if (prob <= 1) return "+9999";
    if (prob >= 50) return Math.round(-100 * (prob / (100 - prob)));
    return "+" + Math.round(100 * ((100 - prob) / prob));
}

async function update() {
    const apiStatus = document.getElementById('api-status');
    const clock = document.getElementById('clock');
    apiStatus.innerText = "API: PULLING...";

    try {
        // 1. Pull Odds and Schedule
        const oddsUrl = `${CORS}${encodeURIComponent(`https://api.the-odds-api.com/v4/sports/baseball_mlb/odds/?regions=us&apiKey=${ODDS_KEY}&bookmakers=hardrock&oddsFormat=american`)}`;
        const schedUrl = `${CORS}${encodeURIComponent('https://statsapi.mlb.com/api/v1/schedule?sportId=1&hydrate=linescore')}`;

        const [oddsRes, mlbRes] = await Promise.all([fetch(oddsUrl), fetch(schedUrl)]);
        const oddsData = await oddsRes.json();
        const mlbData = await mlbRes.json();
        const games = mlbData.dates?.[0]?.games || [];

        if (games.length === 0) {
            document.getElementById('grid-body').innerHTML = '<tr><td colspan="7" class="loading-text">NO GAMES SCHEDULED TODAY</td></tr>';
            apiStatus.innerText = "API: SLEEP";
            return;
        }

        const tableRows = [];
        let alarmTriggered = false;

        // 2. Fetch Live Stats for each game
        for (const game of games) {
            const homeTeam = game.teams.home.team.name;
            const liveUrl = `${CORS}${encodeURIComponent(`https://statsapi.mlb.com/api/v1.1/game/${game.gamePk}/feed/live`)}`;
            
            try {
                const liveRes = await fetch(liveUrl);
                const liveData = await liveRes.json();
                
                // Get Live Probability (Fallback to 50% if game hasn't started or probability is missing)
                const homeWP = liveData?.liveData?.plays?.currentPlay?.about?.homeWinProbability;

                // STRICT: Only show games that have live percentage data
                if (homeWP === undefined || homeWP === null) continue;

                const oddsMatch = oddsData.find(o => o.home_team === homeTeam || o.away_team === homeTeam);
                const hrHome = oddsMatch?.bookmakers?.[0]?.markets?.[0]?.outcomes?.find(o => o.name === homeTeam);

                if (hrHome) {
                    const amOdds = hrHome.price;
                    const bookProb = amToProb(amOdds);
                    const gap = homeWP - bookProb;

                    if (gap >= THRESHOLD) alarmTriggered = true;

                    tableRows.push({
                        city: homeTeam.split(' ').pop(),
                        inn: game.linescore?.currentInningOrdinal ? (game.linescore.inningHalf === 'top' ? '▲' : '▼') + game.linescore.currentInningOrdinal : 'PRE',
                        score: `${game.teams.away.score || 0}-${game.teams.home.score || 0}`,
                        bookProb: bookProb.toFixed(1) + '%',
                        mlbWP: homeWP.toFixed(1) + '%',
                        gap: gap.toFixed(1) + '%',
                        gapVal: gap,
                        hrOdds: amOdds > 0 ? '+' + amOdds : amOdds,
                        modelOdds: probToAm(homeWP),
                        isLive: game.status.abstractGameState === 'Live'
                    });
                }
            } catch (innerE) {
                console.warn(`Could not fetch live feed for game ${game.gamePk}`);
            }
        }

        // 3. Render
        tableRows.sort((a, b) => b.gapVal - a.gapVal);
        
        const html = tableRows.length > 0 
            ? tableRows.map(r => `
                <tr>
                    <td class="${r.isLive ? 'live' : ''}">${r.city} <small>${r.inn}</small></td>
                    <td>${r.score}</td>
                    <td>${r.bookProb}</td>
                    <td class="win-pct">${r.mlbWP}</td>
                    <td class="${r.gapVal >= THRESHOLD ? 'gap-high' : ''}">${r.gap}</td>
                    <td class="odd-val">${r.hrOdds}</td>
                    <td>${r.modelOdds}</td>
                </tr>`).join('')
            : '<tr><td colspan="7" class="loading-text">NO LIVE PROBABILITY DATA AVAILABLE YET</td></tr>';

        document.getElementById('grid-body').innerHTML = html;

        if (alarmTriggered) document.getElementById('alarm-sound').play().catch(() => {});
        
        apiStatus.innerText = "API: SLEEP";
        clock.innerText = new Date().toLocaleTimeString();

    } catch (e) {
        console.error(e);
        apiStatus.innerText = "API: ERROR";
        clock.innerText = "RETRYING...";
    }
}

// Start
update();
setInterval(update, 60000);
</script>
</body>
</html>
