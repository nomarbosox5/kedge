<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gap King Pro | Manual Sync</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=JetBrains+Mono:wght@700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f1120;--surface:#1a1d2e;--border:#2d324d;--text:#fff;--sub:#94a3b8;
  --green:#00e676;--red:#ff1744;--amber:#ffea00;--blue:#2979ff;
  --sans:'Inter',sans-serif;--mono:'JetBrains Mono',monospace
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
.screen{display:none;height:100vh;flex-direction:column}
.screen.active{display:flex}

.hdr{padding:18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.hdr-logo{font-size:20px;font-weight:800;color:var(--green)}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:15px;overflow-y:auto}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:15px;cursor:pointer}
.card.live{border-color:var(--green);box-shadow:0 0 10px rgba(0,230,118,0.2)}

.sig-box{margin:15px;padding:25px;border-radius:16px;text-align:center;transition:0.3s}
.sig-box.idle{background:var(--surface);border:1px solid var(--border)}
.sig-box.warn{background:#2e2600;border:2px solid var(--amber);animation:pulse 1s infinite}
.sig-box.buy{background:#2e0008;border:2px solid var(--red);animation:flash 0.5s infinite}
@keyframes flash{0%,100%{opacity:1}50%{opacity:0.6}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}

.sig-status{font-size:12px;font-weight:800;color:var(--sub);letter-spacing:2px}
.sig-action{font-size:28px;font-weight:800;margin:5px 0}
.sig-why{font-size:14px;font-weight:700;color:var(--amber);text-transform:uppercase}

.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:0 15px}
.stat-card{background:var(--surface);padding:15px;border-radius:12px;text-align:center}
.v{font-family:var(--mono);font-size:22px;color:var(--text)}
.l{font-size:10px;color:var(--sub);margin-top:4px}

.manual-row{padding:15px;display:flex;justify-content:center}
.sync-btn{background:var(--blue);color:#fff;border:none;padding:12px 24px;border-radius:30px;font-weight:800;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:0.2s}
.sync-btn:active{transform:scale(0.95);background:#1e56cc}
.sync-btn:disabled{background:var(--border);opacity:0.6}
</style>
</head>
<body>

<div class="screen active" id="list">
  <div class="hdr"><div class="hdr-logo">GAP KING PRO</div></div>
  <div class="grid" id="grid">Loading Games...</div>
</div>

<div class="screen" id="watch">
  <div class="hdr"><button onclick="back()" style="background:none;border:none;color:var(--blue);font-weight:700">‹ TEAMS</button></div>
  <div class="sig-box idle" id="box">
    <div class="sig-status">ENGINE STATUS</div>
    <div class="sig-action" id="act">SCANNING</div>
    <div class="sig-why" id="why">READY FOR DATA</div>
  </div>
  <div class="stats">
    <div class="stat-card"><div class="v" id="v-mlb">--</div><div class="l">MLB WP%</div></div>
    <div class="stat-card"><div class="v" id="v-book">--</div><div class="l">BOOK %</div></div>
    <div class="stat-card"><div class="v" id="v-gap">--</div><div class="l">THE GAP</div></div>
  </div>
  <div class="manual-row">
    <button class="sync-btn" id="sync-btn" onclick="manualSync()">
      <span>🔄</span> SYNC ODDS
    </button>
  </div>
</div>

<script>
const KEY = '75fbd1947a7dec109b7573b6951a65aa'; 
let current = null;
let poller = null;

const audio = new (window.AudioContext || window.webkitAudioContext)();
function sfx(f, d) {
  const o = audio.createOscillator(); const g = audio.createGain();
  o.connect(g); g.connect(audio.destination);
  o.frequency.value = f; g.gain.setValueAtTime(0.1, audio.currentTime);
  o.start(); o.stop(audio.currentTime + d);
}

async function load() {
  const r = await fetch('/mlb-proxy/api/v1/schedule?sportId=1');
  const d = await r.json();
  const gms = d.dates[0]?.games || [];
  const container = document.getElementById('grid');
  container.innerHTML = '';
  gms.forEach(g => {
    const isLive = g.status.detailedState === 'In Progress';
    const div = document.createElement('div');
    div.className = `card ${isLive ? 'live' : ''}`;
    div.innerHTML = `<strong>${g.teams.home.team.name.split(' ').pop()}</strong><br><small>${g.teams.away.team.abbreviation} @ ${g.teams.home.team.abbreviation}</small>`;
    div.onclick = () => start(g);
    container.appendChild(div);
  });
}

async function start(g) {
  current = g;
  document.getElementById('list').classList.remove('active');
  document.getElementById('watch').classList.add('active');
  poll(); poller = setInterval(poll, 60000); 
}

async function manualSync() {
  const btn = document.getElementById('sync-btn');
  btn.disabled = true;
  btn.querySelector('span').textContent = '⏳';
  await poll();
  setTimeout(() => {
    btn.disabled = false;
    btn.querySelector('span').textContent = '🔄';
  }, 2000);
}

async function poll() {
  if(!current) return;
  try {
    const mlbR = await fetch(`/mlb-proxy/api/v1.1/game/${current.gamePk}/feed/live`);
    const mlbD = await mlbR.json();
    const wp = mlbD.liveData?.plays?.currentPlay?.about?.homeWinProbability || 50;

    const oddsR = await fetch(`/odds-proxy/v4/sports/baseball_mlb/odds/?apiKey=${KEY}&regions=us&markets=h2h`);
    const oddsD = await oddsR.json();
    const match = oddsD.find(o => o.home_team.includes(current.teams.home.team.name));
    const book = match ? (1 / match.bookmakers[0].markets[0].outcomes[0].price) * 100 : 50;

    render(wp, book);
  } catch(e) { console.log("Sync Error", e); }
}

function render(wp, book) {
  const gap = wp - book;
  document.getElementById('v-mlb').textContent = wp.toFixed(1) + '%';
  document.getElementById('v-book').textContent = book.toFixed(1) + '%';
  document.getElementById('v-gap').textContent = gap.toFixed(1) + '%';
  document.getElementById('v-gap').style.color = gap >= 0 ? 'var(--green)' : 'var(--red)';

  const b = document.getElementById('box');
  const a = document.getElementById('act');
  const w = document.getElementById('why');

  if(gap >= 8) {
    b.className = 'sig-box buy'; a.textContent = 'STRIKE NOW'; w.textContent = 'MODEL PEAK GAP';
    sfx(880, 0.4); sfx(1100, 0.2); 
  } else if(gap >= 5) {
    b.className = 'sig-box warn'; a.textContent = 'EDGE FORMING'; w.textContent = 'MARKET LAG DETECTED';
    sfx(440, 0.1); 
  } else {
    b.className = 'sig-box idle'; a.textContent = 'MONITORING'; w.textContent = 'LINES ARE FLAT';
  }
}

function back() {
  clearInterval(poller);
  document.getElementById('watch').classList.remove('active');
  document.getElementById('list').classList.add('active');
}

load();
</script>
</body>
</html>
